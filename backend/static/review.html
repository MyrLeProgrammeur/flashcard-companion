<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>Review — Flashcard Companion</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/vendor/katex/katex.min.css">
  <script src="/vendor/katex/katex.min.js" defer></script>
  <script src="/vendor/katex/contrib/auto-render.min.js" defer></script>
  <script src="/i18n.js" defer></script>
  <script src="/common.js" defer></script>
</head>
<body>
  <div class="app">
    <div class="review-body">
      <!-- topbar -->
      <div class="topbar">
        <a class="back" href="/" aria-label="Back" data-i18n-attr="aria-label:common.back" id="back-btn"></a>
        <div class="prog-wrap">
          <div class="prog-head">
            <span id="deck-name">—</span>
            <span class="pos"><b id="pos">0</b> / <span id="total">0</span></span>
          </div>
          <div class="progress"><span id="bar" style="width:0%"></span></div>
        </div>
        <span class="health-pill" id="health"><span class="dot"></span></span>
      </div>

      <!-- flip card -->
      <div class="card-flip" id="flip">
        <div class="card-inner">
          <div class="card-face front">
            <span class="face-label" data-i18n="review.recto">Recto</span>
            <div class="card-q" id="front"></div>
            <div class="card-hint" data-i18n="review.tapReveal">Touchez pour révéler</div>
          </div>
          <div class="card-face back">
            <span class="face-label" data-i18n="review.verso">Verso</span>
            <div class="card-a" id="back"></div>
            <div class="card-note hidden" id="note"></div>
          </div>
        </div>
      </div>

      <!-- bottom zone -->
      <div class="review-foot">
        <!-- recto state -->
        <div class="recto-band" id="recto-band" data-i18n="review.tapToAnswer">
          Tap the card to answer
        </div>
        <!-- shortcut to source PDF (Batch 6) — independent of flip state -->
        <a class="source-link hidden" id="source-link"></a>
        <!-- verso state -->
        <button class="explain-btn hidden" id="explain-btn"></button>
        <div class="rating-row hidden" id="rating-row">
          <button class="rate again" data-q="1"><span class="lbl" data-i18n="rate.again">Encore</span><span class="iv" data-iv="again"></span></button>
          <button class="rate hard" data-q="3"><span class="lbl" data-i18n="rate.hard">Difficile</span><span class="iv" data-iv="hard"></span></button>
          <button class="rate good" data-q="4"><span class="lbl" data-i18n="rate.good">Correct</span><span class="iv" data-iv="good"></span></button>
          <button class="rate easy" data-q="5"><span class="lbl" data-i18n="rate.easy">Facile</span><span class="iv" data-iv="easy"></span></button>
        </div>
      </div>

      <!-- session end -->
      <div class="session-end hidden" id="session-end">
        <div class="big" data-i18n="review.sessionDone">Session terminée</div>
        <p id="end-sub" data-i18n="review.allReviewed">Toutes les cartes dues ont été revues.</p>
        <a class="cta" href="/" style="width:auto;padding:14px 28px;margin-top:12px" data-i18n="review.backToDecks">Retour aux decks</a>
      </div>
    </div>
  </div>

  <!-- explain bottom sheet (1c / 1d) -->
  <div class="sheet-overlay" id="sheet-overlay"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-grab"></div>
    <div class="sheet-head">
      <h2 data-i18n="review.deepExplTitle">Explication approfondie</h2>
      <button class="sheet-close" id="sheet-close" aria-label="Close" data-i18n-attr="aria-label:common.close"></button>
    </div>
    <div class="sheet-scroll">
      <div class="src-chip pdf hidden" id="src-chip"></div>
      <div class="degr-band hidden" id="degr-band"></div>
      <div class="md" id="explain-md"></div>
    </div>
    <div class="sheet-foot" id="sheet-foot">
      <span class="foot-meta" id="foot-meta"></span>
      <div class="fb hidden" id="explain-feedback">
        <span class="fb-ask" id="fb-ask">
          <span class="fb-q" data-i18n="review.fbQuestion">Utile&nbsp;?</span>
          <button class="fb-btn" id="fb-up" data-vote="1" aria-label="👍" data-i18n-attr="aria-label:review.fbUp">👍</button>
          <button class="fb-btn" id="fb-down" data-vote="-1" aria-label="👎" data-i18n-attr="aria-label:review.fbDown">👎</button>
        </span>
        <span class="fb-thanks hidden" id="fb-thanks" data-i18n="review.fbThanks">Merci, c'est noté</span>
      </div>
    </div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
