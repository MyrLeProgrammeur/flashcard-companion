<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>Courses — Flashcard Companion</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <script src="/i18n.js" defer></script>
  <script src="/common.js" defer></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a class="icon-btn" href="/" aria-label="Back" data-i18n-attr="aria-label:common.back" id="back-btn"></a>
      <span class="mono" data-i18n="nav.courses">Cours</span>
      <div id="menu-mount"></div>
    </header>

    <nav class="crumbs hidden" id="crumbs"></nav>
    <h1 class="screen-title" id="courses-title" data-i18n="courses.title">PDF de cours</h1>
    <p class="screen-sub" id="courses-sub" data-i18n="courses.sub">Un dossier par matière, retrouvé automatiquement à partir des decks — pas garanti à 100%.</p>

    <div class="deck-list" id="courses-list"></div>
  </div>

  <script src="/courses.js" defer></script>
</body>
</html>
