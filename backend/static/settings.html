<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>Settings — Flashcard Companion</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <script>
    /* Pre-paint theme. common.js is deferred, so it only runs after parsing —
       the page had already painted light and then flipped to dark. That flip
       was the flash. `color-scheme` makes the UA paint its own canvas dark
       too, which covers the gap between navigations. */
    (function () {
      try {
        var t = localStorage.getItem("fc-theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
        document.documentElement.style.colorScheme = t;
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/style.css">
  <script src="/i18n.js" defer></script>
  <script src="/common.js" defer></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <a class="icon-btn" href="/" aria-label="Back" data-i18n-attr="aria-label:common.back" id="back-btn"></a>
      <span class="mono" data-i18n="nav.settings">Réglages</span>
      <div id="menu-mount"></div>
    </header>

    <h1 class="screen-title">SM-2</h1>
    <p class="screen-sub" data-i18n="settings.sm2Sub">Intervalles gradués (en jours) appliqués dès la 1ʳᵉ révision, et bonus des cartes matures.</p>

    <form class="settings-form" id="settings-form">
      <div class="settings-card">
        <label class="settings-row">
          <span class="settings-label" data-i18n="rate.again">Encore</span>
          <span class="settings-input-wrap">
            <input class="settings-input" type="number" step="0.1" min="0" name="again_days" id="again_days" required>
            <span class="settings-unit" data-i18n="settings.unitDays">j</span>
          </span>
        </label>
        <label class="settings-row">
          <span class="settings-label" data-i18n="rate.hard">Difficile</span>
          <span class="settings-input-wrap">
            <input class="settings-input" type="number" step="0.1" min="0" name="hard_days" id="hard_days" required>
            <span class="settings-unit" data-i18n="settings.unitDays">j</span>
          </span>
        </label>
        <label class="settings-row">
          <span class="settings-label" data-i18n="rate.good">Correct</span>
          <span class="settings-input-wrap">
            <input class="settings-input" type="number" step="0.1" min="0" name="good_days" id="good_days" required>
            <span class="settings-unit" data-i18n="settings.unitDays">j</span>
          </span>
        </label>
        <label class="settings-row">
          <span class="settings-label" data-i18n="rate.easy">Facile</span>
          <span class="settings-input-wrap">
            <input class="settings-input" type="number" step="0.1" min="0" name="easy_days" id="easy_days" required>
            <span class="settings-unit" data-i18n="settings.unitDays">j</span>
          </span>
        </label>
        <label class="settings-row">
          <span class="settings-label" data-i18n="settings.easyBonus">Bonus Facile</span>
          <span class="settings-input-wrap">
            <input class="settings-input" type="number" step="0.05" min="1" name="easy_bonus" id="easy_bonus" required>
            <span class="settings-unit">×</span>
          </span>
        </label>
      </div>

      <h1 class="screen-title" data-i18n="settings.notifTitle">Notifications</h1>
      <p class="screen-sub" data-i18n="settings.notifSub">Heure du rappel quotidien s'il reste des cartes dues (Termux, local, sans Google).</p>

      <div class="settings-card">
        <label class="settings-row">
          <span class="settings-label" data-i18n="settings.reminderHour">Heure du rappel</span>
          <span class="settings-input-wrap">
            <input class="settings-input" type="number" step="1" min="0" max="23" name="notify_hour" id="notify_hour" required>
            <span class="settings-unit">h</span>
          </span>
        </label>
      </div>

      <button class="cta" type="submit" id="save-btn" data-i18n="settings.save">Enregistrer</button>
      <p class="settings-status" id="status"></p>
    </form>
  </div>

  <script src="/settings.js" defer></script>
</body>
</html>
